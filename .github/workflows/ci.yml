name: "CI"

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-hygiene:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify clean checkout
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "FAIL: checkout is not clean" >&2
            git status --short >&2
            exit 1
          fi

      - name: Install ripgrep (host-truth-test)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run docs consistency test
        run: bash scripts/tests/docs-consistency-test.sh

      - name: Run host truth test
        run: bash scripts/tests/host-truth-test.sh

      - name: Run repo toolchain policy test
        run: bash scripts/tests/repo-toolchain-policy-test.sh

      - name: Run workflow contract test
        run: bash scripts/tests/workflow-contract-test.sh

      - name: Run shim delegation test
        run: bash scripts/tests/shim-delegation-test.sh

  darwin-contract:
    runs-on: macos-latest
    env:
      CACHIX_CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify clean checkout
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "FAIL: checkout is not clean" >&2
            git status --short >&2
            exit 1
          fi

      - name: Install Nix (Determinate Systems)
        uses: DeterminateSystems/nix-installer-action@v19
        with:
          planner: macos
          nix-build-user-base: 351
          nix-build-user-count: 6
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Configure Cachix
        if: ${{ env.CACHIX_CACHE_NAME != '' && env.CACHIX_AUTH_TOKEN != '' }}
        uses: cachix/cachix-action@v14
        with:
          name: ${{ env.CACHIX_CACHE_NAME }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Prepare local inputs
        id: local_inputs
        run: |
          set -euo pipefail
          LOCAL_DIR="$RUNNER_TEMP/dotfiles-local"
          SECRETS_DIR="$RUNNER_TEMP/dotfiles-secrets"
          mkdir -p "$LOCAL_DIR" "$SECRETS_DIR"

          cat > "$LOCAL_DIR/facts.nix" <<EOF
          {
            user = {
              username = "runner";
              fullName = "CI Runner";
              email = "ci@example.invalid";
              homeDirectory = "$HOME";
              stateVersion = {
                home = "25.11";
                darwin = 6;
              };
            };
            machines = {
              pro_mac = {
                computerName = "CI Mac";
                localHostName = "ci-mac";
                hostName = "ci-mac.local";
              };
              ultra_mac = {
                computerName = "CI Mac";
                localHostName = "ci-mac";
                hostName = "ci-mac.local";
              };
              minimal_mac = {
                computerName = "CI Mac";
                localHostName = "ci-mac";
                hostName = "ci-mac.local";
              };
            };
          }
          EOF

          echo "local_dir=$LOCAL_DIR" >> "$GITHUB_OUTPUT"
          echo "secrets_dir=$SECRETS_DIR" >> "$GITHUB_OUTPUT"

      - name: Run Nix Flake Check
        run: >
          nix flake check
          --override-input local path:${{ steps.local_inputs.outputs.local_dir }}
          --override-input secrets path:${{ steps.local_inputs.outputs.secrets_dir }}

      - name: Run target manifest test
        run: bash scripts/tests/targets-manifest-test.sh

      - name: Evaluate darwin configurations
        run: |
          set -euo pipefail
          # macOS default bash is 3.2 (no mapfile); use a portable read loop.
          targets=()
          while IFS= read -r line || [[ -n "$line" ]]; do
            [[ -n "$line" ]] && targets+=("$line")
          done < <(
            nix eval --raw '.#darwinConfigurations' \
              --impure \
              --apply '
                targets:
                  let
                    manifest = (import ./nix/scripts/targets-manifest.nix {}).json targets;
                    profileTargets = builtins.concatLists (map (host: builtins.attrValues host.targetsByProfile) (builtins.attrValues manifest.hosts));
                    targetSet = builtins.listToAttrs (map (target: { name = target; value = true; }) profileTargets);
                  in
                  builtins.concatStringsSep "\n" (builtins.sort builtins.lessThan (builtins.attrNames targetSet))
              ' \
              --override-input local path:${{ steps.local_inputs.outputs.local_dir }} \
              --override-input secrets path:${{ steps.local_inputs.outputs.secrets_dir }}
          )

          if [[ "${#targets[@]}" -eq 0 ]]; then
            echo "FAIL: no darwinConfigurations resolved" >&2
            exit 1
          fi

          for target in "${targets[@]}"; do
            echo "Evaluating $target"
            nix eval --raw ".#darwinConfigurations.${target}.system.drvPath" \
              --override-input local path:${{ steps.local_inputs.outputs.local_dir }} \
              --override-input secrets path:${{ steps.local_inputs.outputs.secrets_dir }} \
              >/dev/null
          done

      - name: Build default and extra profile targets
        run: |
          set -euo pipefail
          build_targets=()
          while IFS= read -r line || [[ -n "$line" ]]; do
            [[ -n "$line" ]] && build_targets+=("$line")
          done < <(
            nix eval --raw '.#darwinConfigurations' \
              --impure \
              --apply '
                targets:
                  let
                    manifest = (import ./nix/scripts/targets-manifest.nix {}).json targets;
                    hostTargets =
                      builtins.concatLists (
                        map
                          (host:
                            let
                              extraProfile = if host.defaultProfile == "minimal" then "ultra" else "minimal";
                            in
                            [
                              host.buildTarget
                            ]
                            ++ (
                              if builtins.hasAttr extraProfile host.targetsByProfile then
                                [ host.targetsByProfile.${extraProfile} ]
                              else
                                [ ]
                            ))
                          (builtins.attrValues manifest.hosts)
                      );
                  in
                  builtins.concatStringsSep "\n" (
                    builtins.sort builtins.lessThan (
                      builtins.attrNames (
                        builtins.listToAttrs (
                          map (target: { name = target; value = true; }) hostTargets
                        )
                      )
                    )
                  )
              ' \
              --override-input local path:${{ steps.local_inputs.outputs.local_dir }} \
              --override-input secrets path:${{ steps.local_inputs.outputs.secrets_dir }}
          )

          if [[ "${#build_targets[@]}" -eq 0 ]]; then
            echo "FAIL: no darwin build targets resolved" >&2
            exit 1
          fi

          for target in "${build_targets[@]}"; do
            echo "Building $target"
            nix build --no-link ".#darwinConfigurations.${target}.system" \
              --override-input local path:${{ steps.local_inputs.outputs.local_dir }} \
              --override-input secrets path:${{ steps.local_inputs.outputs.secrets_dir }}
          done
