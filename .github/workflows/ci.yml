name: "CI"

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix (Determinate Systems)
        uses: DeterminateSystems/nix-installer-action@v19
        with:
          planner: macos
          nix-build-user-base: 351
          nix-build-user-count: 6
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Configure Cachix
        if: ${{ vars.CACHIX_CACHE_NAME != '' && secrets.CACHIX_AUTH_TOKEN != '' }}
        uses: cachix/cachix-action@v14
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      
      - name: Prepare local inputs
        id: local_inputs
        run: |
          set -euo pipefail
          LOCAL_DIR="$RUNNER_TEMP/dotfiles-local"
          SECRETS_DIR="$RUNNER_TEMP/dotfiles-secrets"
          mkdir -p "$LOCAL_DIR" "$SECRETS_DIR"

          ARCH="$(uname -m)"
          case "$ARCH" in
            arm64) ARCH_NIX="aarch64" ;;
            x86_64) ARCH_NIX="x86_64" ;;
            *) ARCH_NIX="$ARCH" ;;
          esac
          PLATFORM="${ARCH_NIX}-darwin"

          cat > "$LOCAL_DIR/facts.nix" <<EOF
          {
            user = {
              username = "runner";
              fullName = "CI Runner";
              email = "ci@example.invalid";
              homeDirectory = "$HOME";
              platform = "$PLATFORM";
              stateVersion = {
                home = "25.05";
                darwin = 6;
              };
            };
            machines = {
              a2m_mac = {
                computerName = "CI Mac";
                localHostName = "ci-mac";
                hostName = "ci-mac.local";
              };
              mn_mac = {
                computerName = "CI Mac";
                localHostName = "ci-mac";
                hostName = "ci-mac.local";
              };
            };
          }
          EOF

          cat > "$SECRETS_DIR/secrets.nix" <<'EOF'
          { }
          EOF

          echo "local_dir=$LOCAL_DIR" >> "$GITHUB_OUTPUT"
          echo "secrets_dir=$SECRETS_DIR" >> "$GITHUB_OUTPUT"

      - name: Run Nix Flake Check
        run: >
          nix flake check
          --override-input local path:${{ steps.local_inputs.outputs.local_dir }}
          --override-input secrets path:${{ steps.local_inputs.outputs.secrets_dir }}

      - name: Build darwin configuration (a2m_mac)
        run: >
          nix build .#darwinConfigurations.a2m_mac.system
          --override-input local path:${{ steps.local_inputs.outputs.local_dir }}
          --override-input secrets path:${{ steps.local_inputs.outputs.secrets_dir }}

      - name: Build darwin configuration (mn_mac)
        run: >
          nix build .#darwinConfigurations.mn_mac.system
          --override-input local path:${{ steps.local_inputs.outputs.local_dir }}
          --override-input secrets path:${{ steps.local_inputs.outputs.secrets_dir }}

      - name: Build minimum configuration (a2m_mac-minimum)
        run: >
          nix build .#darwinConfigurations.a2m_mac-minimum.system
          --override-input local path:${{ steps.local_inputs.outputs.local_dir }}
          --override-input secrets path:${{ steps.local_inputs.outputs.secrets_dir }}

      - name: Build minimum configuration (mn_mac-minimum)
        run: >
          nix build .#darwinConfigurations.mn_mac-minimum.system
          --override-input local path:${{ steps.local_inputs.outputs.local_dir }}
          --override-input secrets path:${{ steps.local_inputs.outputs.secrets_dir }}
